name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyyaml
      - name: Run backend tests
        run: python -m unittest discover -v
      - name: Check frontend JavaScript
        run: |
          node --check ctv_web/js/i18n.js
          node --check ctv_web/js/hotspot.js
          node --check ctv_web/js/geometry.js
          node --check ctv_web/js/app.js
          node --check ctv_web/js/timeline.js
          node --check ctv_web/js/player.js
          node tests/test_hotspot.js
          node tests/test_geometry.js
          sh -n scripts/release.sh
      - name: Validate Home Assistant app metadata
        run: |
          python - <<'PY'
          import yaml
          with open("repository.yaml", encoding="utf-8") as handle:
              repository = yaml.safe_load(handle)
          with open("cctv_viewer/config.yaml", encoding="utf-8") as handle:
              app = yaml.safe_load(handle)
          with open("cctv_viewer_beta/config.yaml", encoding="utf-8") as handle:
              beta = yaml.safe_load(handle)
          assert repository["name"] and repository["url"]
          assert app["slug"] == "cctv_viewer"
          assert beta["slug"] == "cctv_viewer_beta"
          assert beta["image"].endswith(":beta")
          assert set(app["arch"]) == {"amd64", "aarch64"}
          assert set(beta["arch"]) == {"amd64", "aarch64"}
          assert app["ingress"] is True and app["ingress_stream"] is True
          assert app["panel_admin"] is True
          assert str(app["environment"]["CTV_HA_ADMIN_ONLY"]) == "1"
          assert any(item.get("type") == "media" and item.get("read_only") for item in app["map"])
          with open("cctv_viewer/apparmor.txt", encoding="utf-8") as handle:
              apparmor = handle.read()
          assert "/media/ r," in apparmor
          assert "/media/** r," in apparmor
          PY
      - name: Build container
        run: docker build --build-arg BUILD_VERSION=ci -t cctv-viewer:ci .
      - name: Smoke test container import
        run: >-
          docker run --rm --entrypoint python --workdir /data
          --env PYTHONPATH= cctv-viewer:ci
          -c "import ctv_server.main; print('ctv_server import: passed')"
