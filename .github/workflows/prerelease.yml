name: Pre-release

on:
  push:
    branches:
      - pre-release
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve beta version
        id: version
        run: |
          python -m pip install pyyaml
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import yaml
          with open("cctv_viewer_beta/config.yaml", encoding="utf-8") as handle:
              print(f"value={yaml.safe_load(handle)['version']}")
          PY
      - name: Build and publish beta image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: BUILD_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/cctv-viewer:beta
            ghcr.io/${{ github.repository_owner }}/cctv-viewer:${{ steps.version.outputs.value }}
