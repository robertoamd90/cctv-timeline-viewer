name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python -m pip install pyyaml
          python - <<'PY'
          import os
          import yaml
          with open("cctv_viewer/config.yaml", encoding="utf-8") as handle:
              version = yaml.safe_load(handle)["version"]
          expected = os.environ["RELEASE_TAG"].removeprefix("v")
          if version != expected:
              raise SystemExit(f"config.yaml version {version} does not match tag {expected}")
          PY
      - name: Build and publish multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: BUILD_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/cctv-viewer:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/cctv-viewer:latest
